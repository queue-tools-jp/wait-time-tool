<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>到達時間予測</title>

<style>

body{
  font-family:"Segoe UI",sans-serif;
  background:#f4f6f8;
  padding:40px;
  font-size:18px;
}

.container{
  max-width:920px;
  margin:auto;
  background:#fff;
  padding:28px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
  text-align:center;
  margin-bottom:16px;
  font-size:26px;
}

.row{
  display:grid;
  grid-template-columns:80px 140px 260px 1fr;
  gap:10px;
  align-items:center;
  margin-top:12px;
}

label{
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  font-size:16px;
}

button{
  padding:10px;
  font-size:16px;
  background:#0078d4;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-clear{
  background:#999;
}

.result{
  margin-top:18px;
  padding:16px;
  background:#f0f7ff;
  border-radius:8px;
  line-height:1.8;
}

.ref{
  font-size:14px;
}

.ref-line{
  font-size:14px;
  line-height:1.6;
}

.bottom-buttons{
  margin-top:16px;
  display:flex;
  gap:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>到達時間予測</h1>

<div class="row">

<label>基準</label>

<input
  type="time"
  id="t0"
  name="t0"
  step="1"
  oninput="saveData()"
  autocomplete="new-password"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
>

<div style="display:flex; gap:6px; align-items:center;">

  <input
    type="number"
    id="q0"
    name="q0"
    placeholder="番号"
    oninput="saveData()"
autocomplete="new-password"
autocorrect="off"
autocapitalize="off"
spellcheck="false"
  >

  <button onclick="setNow('t0')">今</button>

  <button
    class="btn-clear"
    onclick="clearRow(0)"
  >
    C
  </button>

</div>

<div class="ref" id="ref0"></div>

</div>

<div id="points"></div>

<details style="margin-top:16px;">
  <summary style="cursor:pointer; font-weight:bold;">
    追加ポイント（#6〜#10）
  </summary>

  <div id="extraPoints"></div>
</details>

<label style="margin-top:14px; display:block;">
  直近重み強さ（1〜10）
</label>

<input
  type="number"
  id="weightPower"
  name="weightPower"
  value="2"
  min="1"
  max="10"
  oninput="saveData()"
  autocomplete="new-password"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
>

<div class="bottom-buttons">

<button onclick="calculate()">計算</button>

<button
  class="btn-clear"
  onclick="clearAll()"
>
  すべてクリア
</button>

</div>

<div class="result" id="result"></div>

</div>

<script>

const MAX = 10;

/* =========================
   行生成
========================= */

function addPoint(i, extra=false){

  const el = document.createElement('div');

  el.className = 'row';

  el.innerHTML = `

    <label>#${i}</label>

<input
  type="time"
  id="t${i}"
  name="t${i}"
  step="1"
  oninput="saveData()"
  autocomplete="new-password"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
>

    <div style="display:flex; gap:6px; align-items:center;">

<input
  type="number"
  id="q${i}"
  name="q${i}"
  placeholder="番号"
  oninput="saveData()"
  autocomplete="new-password"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
>

      <button onclick="setNow('t${i}')">今</button>

      <button
        class="btn-clear"
        onclick="clearRow(${i})"
      >
        C
      </button>

    </div>

    <div class="ref" id="ref${i}"></div>

  `;

  if(extra){
    document.getElementById('extraPoints').appendChild(el);
  }else{
    document.getElementById('points').appendChild(el);
  }
}

for(let i=1;i<=5;i++) addPoint(i);
for(let i=6;i<=10;i++) addPoint(i,true);

/* =========================
   現在時刻
========================= */

function setNow(id){

  const d = new Date();

  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  const s = String(d.getSeconds()).padStart(2,'0');

  document.getElementById(id).value =
    `${h}:${m}:${s}`;

  saveData();
}

/* =========================
   クリア
========================= */

function clearRow(i){

  document.getElementById(`t${i}`).value='';
  document.getElementById(`q${i}`).value='';

  const r=document.getElementById(`ref${i}`);

  if(r) r.innerHTML='';

  saveData();
}

function clearAll(){

  for(let i=0;i<=MAX;i++){
    clearRow(i);
  }

  document.getElementById('result').innerHTML='';

  for(let i=0;i<=MAX;i++){

    localStorage.removeItem(`t${i}`);
    localStorage.removeItem(`q${i}`);

    sessionStorage.removeItem(`t${i}`);
    sessionStorage.removeItem(`q${i}`);
  }

  localStorage.removeItem('weightPower');
  localStorage.removeItem('result');

  sessionStorage.removeItem('weightPower');
  sessionStorage.removeItem('result');
}
/* =========================
   LocalStorage 保存
========================= */

function saveData(){

  for(let i=0;i<=MAX;i++){

    const t =
      document.getElementById(`t${i}`)?.value || '';

    const q =
      document.getElementById(`q${i}`)?.value || '';

    localStorage.setItem(`t${i}`,t);
    localStorage.setItem(`q${i}`,q);

    sessionStorage.setItem(`t${i}`,t);
    sessionStorage.setItem(`q${i}`,q);
  }

  const weight =
    document.getElementById('weightPower').value;

  localStorage.setItem('weightPower',weight);
  sessionStorage.setItem('weightPower',weight);

  localStorage.setItem(
    'result',
    document.getElementById('result').innerHTML
  );

  sessionStorage.setItem(
    'result',
    document.getElementById('result').innerHTML
  );
}

/* =========================
   LocalStorage 読込
========================= */

function loadData(){

  for(let i=0;i<=MAX;i++){

    const t =
      localStorage.getItem(`t${i}`) ||
      sessionStorage.getItem(`t${i}`) ||
      '';

    const q =
      localStorage.getItem(`q${i}`) ||
      sessionStorage.getItem(`q${i}`) ||
      '';

    if(document.getElementById(`t${i}`)){
      document.getElementById(`t${i}`).value=t;
    }

    if(document.getElementById(`q${i}`)){
      document.getElementById(`q${i}`).value=q;
    }
  }

  document.getElementById('weightPower').value =
    localStorage.getItem('weightPower') ||
    sessionStorage.getItem('weightPower') ||
    '2';

  document.getElementById('result').innerHTML =
    localStorage.getItem('result') ||
    sessionStorage.getItem('result') ||
    '';
}
/* =========================
   自動復元
========================= */

document.addEventListener(
  'DOMContentLoaded',
  function(){

    loadData();

    setTimeout(function(){

      calculate();

    },100);
  }
);
/* =========================
   時間系
========================= */

function toSec(t){

  const parts = t.split(':').map(Number);

  const h = parts[0] || 0;
  const m = parts[1] || 0;
  const s = parts[2] || 0;

  return h*3600 + m*60 + s;
}

function diffSec(a,b){

  let d = b-a;

  if(d<0) d += 86400;

  return d;
}

function fmt(sec){

  sec=Math.round(sec);

  const day=Math.floor(sec/86400);

  const h=Math.floor(sec/3600)%24;
  const m=Math.floor(sec/60)%60;

  return `${day>0?`+${day}日 `:''}${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function fmtHM(sec){

  sec=Math.round(sec);

  const h=Math.floor(sec/3600);
  const m=Math.floor(sec/60)%60;

  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* =========================
   データ収集
========================= */

function collect(){

  const pts=[];

  for(let i=0;i<=MAX;i++){

    const t=document.getElementById(`t${i}`).value;
    const q=document.getElementById(`q${i}`).value;

    if(t && q!==''){

      pts.push({
        t,
        q:Number(q),
        index:i
      });
    }
  }

  return pts;
}

/* =========================
   計算
========================= */

function calculate(){

  const pts = collect();

  const power =
    Number(document.getElementById('weightPower').value)||2;

  if(pts.length < 2){

    document.getElementById('result').innerText =
      '2点以上入力してください。';

    return;
  }

  let wt=0;
  let wp=0;

  const n=pts.length-1;

  for(let i=0;i<n;i++){

    const a=pts[i];
    const b=pts[i+1];

    const dt=diffSec(
      toSec(a.t),
      toSec(b.t)
    );

    const dq=a.q-b.q;

    if(dt>0 && dq>0){

      const w =
        Math.pow((i+1)/n,power);

      wt += dt*w;
      wp += dq*w;

    }
  }

  if(wp<=0){

    document.getElementById('result').innerText =
      '進行データが不正です。';

    return;
  }

  const spp = wt/wp;

  const perHour = 3600/spp;

  for(let i=0;i<=MAX;i++){

    const e=document.getElementById(`ref${i}`);

    if(e)e.innerHTML='';
  }

  for(let i=1;i<pts.length;i++){

    const prev=pts[i-1];
    const curr=pts[i];

    const dt=diffSec(
      toSec(prev.t),
      toSec(curr.t)
    );

    const dq=prev.q-curr.q;

    if(dt<=0 || dq<=0) continue;

    const localSpeed=dq/dt;

    const localPerHour =
      Math.round(localSpeed*3600);

    const remainSec =
      curr.q/localSpeed;

    const arrival =
      fmt(toSec(curr.t)+remainSec);

    const target =
      document.getElementById(`ref${curr.index}`);

    if(target){

      target.innerHTML=`

        <div class="ref-line">
          約${localPerHour}人/時
        </div>

        <div class="ref-line">
          （参考予測）${arrival}
        </div>

      `;
    }
  }

  const last=pts[pts.length-1];

  const remainSec=last.q*spp;

  const arrival=
    fmt(toSec(last.t)+remainSec);

  const base=pts[0];

  const baseSec=toSec(base.t);

  const arrivalSec=
    toSec(last.t)+remainSec;

  const totalSec=
    diffSec(baseSec,arrivalSec);

  document.getElementById('result').innerHTML=`

    <b>重み付き平均：</b>
      ${(spp/60).toFixed(2)} 分 / 人<br>

    <b>1時間あたり：</b>
      約 ${Math.round(perHour)} 人 / 時<br>

    <b>残り時間：</b>
      約 ${Math.round(remainSec/60)} 分<br>

    <b>所要時間（目安）：</b>
      ${fmtHM(totalSec)}<br>

    <b>到達予測：</b>
      <b>${arrival}</b>

  `;

  saveData();
}

/* =========================
   30秒ごと自動保存
========================= */

setInterval(function(){

  saveData();

},30000);

document.addEventListener(
  'visibilitychange',
  function(){

    if(document.visibilityState === 'hidden'){
      saveData();
    }

  }
);

window.addEventListener(
  'pagehide',
  saveData
);

window.addEventListener(
  'blur',
  saveData
);

</script>

</body>
</html>
